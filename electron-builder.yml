appId: com.knowledge-agent.app
productName: 个人知识库 Agent
copyright: Copyright (C) 2026
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
compression: normal
artifactName: ${productName}-${version}-${platform}-${arch}.${ext}
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
